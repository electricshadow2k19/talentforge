databases:
  - name: talentforge-db
    databaseName: talentforge
    user: talentforge
    plan: free

services:
  - type: web
    name: talentforge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talentforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: USE_AI
        value: "true"
      - key: CORS_ORIGINS
        value: https://talentforge-two.vercel.app,https://talentforge.vercel.app,https://talentforge-electricshadows-projects.vercel.app
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
