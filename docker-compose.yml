services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: talentforge
      POSTGRES_PASSWORD: talentforge
      POSTGRES_DB: talentforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://talentforge:talentforge@db:5432/talentforge
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      JWT_SECRET: change-me-in-production-talentforge-jwt-secret
      STORAGE_LOCAL_PATH: /app/storage
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
  backend_storage:
  frontend_node_modules:
