# Production all-in-one Docker deployment (VPS / ECS)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talentforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-talentforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talentforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-talentforge}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USE_AI: ${USE_AI:-true}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_PATH: /app/storage
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      ENVIRONMENT: production
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/seed.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_storage:
